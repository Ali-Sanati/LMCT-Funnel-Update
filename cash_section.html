<style>
  /* ===== LMCT+ Cash Hero Section ===== */
  /* @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"); */

  .cash-hero {
    font-family:
      "Inter",
      "Segoe UI",
      system-ui,
      -apple-system,
      sans-serif;
    position: relative;
    width: 100%;
    padding: 72px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    /* background:
      radial-gradient(
        ellipse 70% 60% at 50% 45%,
        rgba(40, 180, 70, 0.35) 0%,
        transparent 70%
      ),
      radial-gradient(
        ellipse 90% 80% at 50% 50%,
        rgba(20, 120, 50, 0.2) 0%,
        transparent 80%
      ),
      radial-gradient(
        circle at 50% 40%,
        rgba(100, 220, 100, 0.1) 0%,
        transparent 50%
      ),
      linear-gradient(
        180deg,
        #0a3d1a 0%,
        #0d4f22 30%,
        #0a3d1a 70%,
        #062a12 100%
      ); */
    box-sizing: border-box;
  }

  .cash-hero *,
  .cash-hero *::before,
  .cash-hero *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  /* Light burst overlay */
  .cash-hero::before {
    content: "";
    position: absolute;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 120%;
    height: 80%;
    background: radial-gradient(
      ellipse 50% 50% at 50% 50%,
      rgba(120, 255, 120, 0.08) 0%,
      transparent 70%
    );
    pointer-events: none;
    z-index: 0;
  }

  .cash-hero-inner {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    max-width: 700px;
    width: 100%;
  }

  /* --- Top Label --- */
  .cash-label {
    display: inline-block;
    background: rgba(0, 0, 0, 0.85);
    color: #fff;
    font-size: clamp(28px, 5vw, 38px);
    font-weight: 500;
    font-style: italic;
    padding: 8px 28px;
    border-radius: 24px;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
    margin-bottom: 20px;
  }

  /* --- Main Headline --- */
  .cash-headline {
    font-size: clamp(48px, 5vw, 68px);
    font-weight: 800;
    color: #fff;
    letter-spacing: 1px;
    line-height: 1.2;
    margin-bottom: 18px;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  }

  /* --- Price Banner Stack --- */
  .cash-price-stack {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Stacked card layers behind price */
  .cash-price-wrap {
    position: relative;
    display: inline-block;
  }

  .cash-price-wrap::before,
  .cash-price-wrap::after {
    content: "";
    position: absolute;
    border-radius: 12px;
    background: rgba(10, 60, 20, 0.7);
    border: 1px solid rgba(80, 200, 80, 0.15);
  }

  .cash-price-wrap::before {
    top: 6px;
    left: -8px;
    right: -8px;
    bottom: -6px;
    transform: rotate(-1.2deg);
    z-index: 0;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
  }

  .cash-price-wrap::after {
    top: 12px;
    left: -14px;
    right: -14px;
    bottom: -12px;
    transform: rotate(1.5deg);
    z-index: -1;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
  }

  .cash-price-banner {
    position: relative;
    z-index: 1;
    display: inline-block;
    background: linear-gradient(180deg, #0d5a28 0%, #0a4420 50%, #083618 100%);
    border: 2px solid rgba(80, 220, 80, 0.25);
    border-radius: 12px;
    padding: 16px 48px;
    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.5),
      inset 0 1px 0 rgba(100, 255, 100, 0.1);
    transition:
      transform 0.3s ease,
      box-shadow 0.3s ease;
    cursor: default;
  }

  .cash-price-banner:hover {
    transform: scale(1.04);
    box-shadow:
      0 12px 40px rgba(0, 0, 0, 0.5),
      0 0 40px rgba(80, 255, 80, 0.15),
      inset 0 1px 0 rgba(100, 255, 100, 0.15);
  }

  .cash-price {
    font-size: clamp(56px, 14vw, 120px);
    font-weight: 900;
    color: #00f225;
    line-height: 1;
    letter-spacing: 2px;
    text-shadow:
      0 0 30px rgba(61, 255, 92, 0.4),
      0 0 60px rgba(61, 255, 92, 0.15),
      0 4px 8px rgba(0, 0, 0, 0.5);
  }

  /* --- Bottom Banner --- */
  .cash-bottom-banner {
    display: inline-block;
    background: rgba(0, 0, 0, 0.9);
    padding: 12px 40px;
    border-radius: 8px;
    margin-top: -4px;
    position: relative;
    z-index: 2;
    box-shadow:
      0 6px 24px rgba(0, 0, 0, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
  }

  .cash-bottom-text {
    font-size: clamp(20px, 4vw, 36px);
    font-weight: 900;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 4px;
    line-height: 1;
    text-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
  }

  /* --- Responsive --- */
  @media (max-width: 767px) {
    .cash-hero {
      padding: 0px 12px;
    }

    .cash-label {
      padding: 6px 20px;
      margin-bottom: 16px;
    }

    .cash-headline {
      margin-bottom: 14px;
    }

    .cash-price-banner {
      padding: 12px 28px;
      border-radius: 10px;
    }

    .cash-price-wrap::before {
      top: 4px;
      left: -5px;
      right: -5px;
      bottom: -4px;
      border-radius: 10px;
    }

    .cash-price-wrap::after {
      top: 8px;
      left: -9px;
      right: -9px;
      bottom: -8px;
      border-radius: 10px;
    }

    .cash-bottom-banner {
      padding: 10px 24px;
      border-radius: 6px;
    }

    .cash-bottom-text {
      letter-spacing: 3px;
    }
  }

  @media (min-width: 1200px) {
    .cash-hero {
      padding: 0px 24px;
    }

    .cash-price-banner {
      padding: 20px 64px;
    }

    .cash-bottom-banner {
      padding: 14px 52px;
    }
  }
</style>

<section class="cash-hero" aria-label="Cash prize alternative">
  <div class="cash-hero-inner">
    <span class="cash-label">Don't want the car?</span>
    <h2 class="cash-headline">How about</h2>
    <div class="cash-price-stack">
      <div class="cash-price-wrap">
        <div class="cash-price-banner">
          <span class="cash-price">$120,000</span>
        </div>
      </div>
      <div class="cash-bottom-banner">
        <span class="cash-bottom-text">Tax Free Cash!</span>
      </div>
    </div>
  </div>
</section>
