<style>
  @import url("https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap");

  .draw-info-section {
    font-family:
      "Inter",
      system-ui,
      -apple-system,
      sans-serif;
    /* padding: clamp(20px, 4vw, 50px); */
  }

  .draw-info-container {
    max-width: 900px;
    margin: 0 auto;
  }

  .draw-block {
    margin-bottom: clamp(20px, 3vw, 32px);
  }

  /* Badge */
  .draw-badge {
    display: inline-block;
    font-size: clamp(14px, 1.5vw, 18px);
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 6px;
    margin-bottom: 10px;
    color: #fff;
  }

  .draw-badge.red {
    background: #e53935;
  }

  .draw-badge.dark {
    background: #0a1a2f;
  }

  /* Main Text */
  .draw-text {
    font-size: clamp(18px, 2.4vw, 26px);
    font-weight: 700;
    color: #0a1a2f;
    margin-left: 20px;
    line-height: 1.4;
  }

  .draw-text span {
    font-weight: 800;
  }

  /* Subtext paragraph style */
  .draw-subtext {
    font-size: clamp(16px, 2vw, 22px);
    font-weight: 600;
    color: #1f2937;
    margin-left: 20px;
    line-height: 1.5;
  }

  @media (min-width: 768px) {
    .draw-info-container {
      max-width: 1000px;
    }
  }
</style>

<section class="draw-info-section">
  <div class="draw-info-container">
    <div class="draw-block">
      <span class="draw-badge red">Draw Date:</span>
      <p class="draw-text">
        <b>March 26th, 2026</b>, at <b>8:30PM</b> AEDT on Facebook Live.
      </p>
    </div>

    <div class="draw-block">
      <span class="draw-badge dark">Selection:</span>
      <p class="draw-subtext">
        Winner chosen via our Government Approved Automated Digital System
        Certified by NSF Global.
      </p>
    </div>

    <div class="draw-block">
      <span class="draw-badge dark">Notification:</span>
      <p class="draw-subtext">
        Winner contacted via phone, email, and social media.
      </p>
    </div>
  </div>
</section>
