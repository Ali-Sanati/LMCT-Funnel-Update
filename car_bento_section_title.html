<style>
  @import url("https://fonts.cdnfonts.com/css/sf-pro-display");

  /* ===== Base ===== */
  .car-hero {
    font-family:
      "SF Pro Display", "Impact", "Arial Black", system-ui, sans-serif;
    position: relative;
    width: 100%;
    min-height: clamp(420px, 60vh, 720px);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    transform: scale(0.8);
    isolation: isolate;
  }

  /* ===== Cinematic Lighting ===== */

  /* Top spotlight glow */
  .car-hero::before {
    content: "";
    position: absolute;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 1200px;
    height: 600px;
    /* background: radial-gradient(
      ellipse at center,
      rgba(255, 255, 255, 0.25) 0%,
      rgba(255, 255, 255, 0.12) 30%,
      rgba(255, 255, 255, 0.05) 50%,
      transparent 70%
    ); */
    z-index: 0;
    pointer-events: none;
  }

  /* Bottom ground fade */
  .car-hero::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 140px;
    /* background: linear-gradient(
      to top,
      rgba(0, 0, 0, 0.45),
      rgba(0, 0, 0, 0.15),
      transparent
    ); */
    z-index: 1;
    pointer-events: none;
  }

  /* ===== Inner Layout ===== */
  .car-hero-inner {
    position: relative;
    z-index: 3;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ===== Car Image ===== */
  .car-hero-image {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: clamp(600px, 70vw, 1000px);
  }

  .car-hero-image img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: contain;
  }

  /* ===== Heading ===== */
  .hero-heading {
    position: absolute;
    top: 60%;
    left: 50%;
    transform: translateX(-50%);
    font-style: italic;
    line-height: 0.85;
    z-index: 4;
  }

  /* Shared line styles */
  .hero-line-first,
  .hero-line-car {
    display: block;
    width: 100vw;
    position: relative;
    white-space: normal;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 0;
  }

  /* First line */
  .hero-line-first {
    font-size: clamp(40px, 7vw, 90px);
    color: #fff;
    -webkit-text-stroke: 20px #000;
    paint-order: stroke fill;
    text-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
  }

  /* Second line */
  .hero-line-car {
    font-size: clamp(38px, 6vw, 95px);
    letter-spacing: -3px;
    color: #3ba0fb;
    -webkit-text-stroke: 20px #000;
    filter: drop-shadow(4px 6px 0 rgba(0, 0, 0, 0.45));
    paint-order: stroke fill;
    /* text-shadow: 0 10px 25px rgba(0, 0, 0, 0.45); */
  }

  /* ===== Responsive Refinements ===== */
  @media (max-width: 768px) {
    .hero-line-first {
      -webkit-text-stroke: 10px #000;
    }

    .hero-line-car {
      -webkit-text-stroke: 10px #000;
      letter-spacing: -1px;
    }
  }
</style>

<section class="car-hero" aria-label="First prize car">
  <div class="car-hero-inner">
    <div class="car-hero-image">
      <img
        src="https://cdn.jumpshare.com/preview/Qm_UA83KoQof7COTJpHMSBlD-NVqYRlZKj8BQBJSnY6UFyY-7uOxPxnjcOXoF88rjGzeHEf3F2yyowKmcuun__avCaXvNB8eD3OrDrgcz7Q"
        alt="Chevrolet Silverado first prize"
        loading="lazy"
      />
    </div>

    <h2 class="hero-heading">
      <span class="hero-line-first">First Prize</span>
      <span class="hero-line-car">Toyota Prado + Patriot Camper</span>
    </h2>
  </div>
</section>
