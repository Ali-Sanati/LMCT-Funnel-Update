<style>
  @import url("https://fonts.cdnfonts.com/css/sf-pro-display");

  /* Car Section Title with Image */
  .car-hero {
    font-family:
      "SF Pro Display", "Impact", "Arial Black", system-ui, sans-serif;
    position: relative;
    width: 100%;
    min-height: 520px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    /* overflow: hidden; */
    padding: 0px 16px 0;
    box-sizing: border-box;
  }

  .car-hero *,
  .car-hero *::before,
  .car-hero *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  /* --- Hero Inner Content --- */
  .car-hero-inner {
    position: relative;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 1100px;
    padding-bottom: 0;
  }

  /* --- Title Block --- */
  .hero-heading {
    line-height: 0.7;
    margin-top: -18%;
    margin-bottom: 0;
    font-style: italic;
    position: relative;
    z-index: 4;
    text-shadow:
      4px 4px 0 #000,
      -2px -2px 0 #000,
      2px -2px 0 #000,
      -2px 2px 0 #000,
      0 4px 8px rgba(0, 0, 0, 0.3);
  }

  .hero-line-first {
    display: inline-block;
    white-space: nowrap;
    font-size: clamp(42px, 8vw, 90px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #fff;
    -webkit-text-stroke: 2.5px #000;
    margin-bottom: 4px;
    position: relative;
    z-index: 5;
  }

  .hero-line-car {
    display: inline-block;
    white-space: nowrap;
    font-size: clamp(38px, 6vw, 95px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -6px;
    color: #0071ce;
    /* background: linear-gradient(135deg, #40cbf6 0%, #0071ce 40%, #0086d4 100%); */
    /* -webkit-background-clip: text; */
    /* background-clip: text; */
    /* -webkit-text-fill-color: transparent; */
    /* filter: drop-shadow(4px 6px 0 rgba(0, 0, 0, 0.45)); */
    -webkit-text-stroke: 3px #000;
    position: relative;
    z-index: 5;
  }

  /* Outline layer behind gradient text */
  /* .hero-line-car::before {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    z-index: -1;
    -webkit-text-fill-color: transparent;
    -webkit-text-stroke: 5px #000;
    filter: none;
  } */

  /* --- Car Image --- */
  .car-hero-image {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 900px;
    margin-top: -30px;
    pointer-events: none;
  }

  .car-hero-image img {
    display: block;
    width: 100%;
    height: auto;
    object-fit: contain;
    filter: drop-shadow(0 12px 30px rgba(0, 0, 0, 0.25));
    border-radius: 18px;
  }

  /* --- Subtle ground reflection --- */
  .car-hero::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 80px;
    z-index: 1;
    pointer-events: none;
  }

  .hero-line-first,
  .hero-line-car {
    position: relative;
    display: inline-block;
    padding: 0 -10%;
  }

  /* Slanted black background */
  .hero-line-first::before,
  .hero-line-car::after {
    content: "";
    position: absolute;
    background: #000;
    transform: skew(-12deg);
    z-index: -1;
    border-radius: 6px;
    inset: 0;
  }

  /* --- Responsive --- */
  @media (min-width: 900px) {
    .car-hero {
      min-height: 600px;
      padding: 0 24px 0;
    }

    .car-hero-image {
      margin-top: -50px;
    }
  }

  @media (min-width: 1200px) {
    .car-hero {
      min-height: 680px;
      padding: 0 32px 0;
    }

    .car-hero-image {
      max-width: 1000px;
      margin-top: -60px;
    }
  }

  @media (max-width: 899px) {
    .car-hero {
      min-height: 400px;
      padding: 0 12px 0;
    }

    .hero-line-first {
      -webkit-text-stroke: 1.5px #000;
      letter-spacing: 1px;
    }

    .hero-line-car {
      -webkit-text-stroke: 2px #000;
      letter-spacing: 0.5px;
    }

    .hero-line-car::before {
      -webkit-text-stroke: 3px #000;
    }

    .car-hero-image {
      margin-top: -20px;
      max-width: 100%;
    }
  }

  @media (max-width: 480px) {
    .hero-heading {
      line-height: 0.1;
    }

    .car-hero-image {
      margin-top: -10px;
    }
  }
</style>

<section class="car-hero" aria-label="First prize car">
  <div class="car-hero-inner">
    <div class="car-hero-image">
      <!-- Replace src with your transparent PNG car image -->
      <img
        src="https://p7.hiclipart.com/preview/298/156/934/2018-chevrolet-silverado-1500-2017-chevrolet-silverado-1500-pickup-truck-car-pickup-truck.jpg"
        alt="Chevrolet Silverado first prize"
        loading="lazy"
      />
    </div>
    <h2 class="hero-heading">
      <span class="hero-line-first">First Prize</span>
      <span class="hero-line-car">Chevrolet Silverado</span>
    </h2>
  </div>
</section>
