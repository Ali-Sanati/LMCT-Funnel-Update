<style>
  @import url("https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap");

  /* ===== Section Base ===== */
  .bento-section {
    font-family:
      "Inter",
      system-ui,
      -apple-system,
      sans-serif;
    padding: 0px 0px;
    box-sizing: border-box;
  }

  .bento-section *,
  .bento-section *::before,
  .bento-section *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  /* ===== Grid (MOBILE FIRST) ===== */
  .bento-grid {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* 2 cols on mobile */
    grid-template-rows: repeat(3, auto); /* 3 rows */
    gap: 12px;
  }

  /* Reset spans on mobile */
  .bento-card {
    grid-column: auto;
    grid-row: auto;
    min-height: 200px;
  }

  /* ===== Card Base ===== */
  .bento-card {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    box-shadow:
      0 4px 20px rgba(0, 0, 0, 0.12),
      0 1px 4px rgba(0, 0, 0, 0.08);
    transition:
      transform 0.3s ease,
      box-shadow 0.3s ease;
  }

  /* Gradient overlay */
  .bento-card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      rgba(0, 0, 0, 0.78) 0%,
      rgba(0, 0, 0, 0.3) 40%,
      transparent 70%
    );
    border-radius: 18px;
    pointer-events: none;
    z-index: 1;
  }

  /* ===== Card Content ===== */
  .bento-card-content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 16px 18px;
    z-index: 2;
  }

  .bento-card-title {
    font-size: clamp(16px, 2.5vw, 22px);
    font-weight: 800;
    color: #fff;
    line-height: 1.25;
    margin-bottom: 4px;
  }

  .bento-card-subtitle {
    font-size: clamp(12px, 1.8vw, 15px);
    font-weight: 500;
    color: rgba(255, 255, 255, 0.75);
    line-height: 1.4;
  }

  /* ===== Desktop Layout ===== */
  @media (min-width: 900px) {
    .bento-section {
      padding: 0px 0px;
    }

    .bento-grid {
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: auto auto auto;
      gap: 18px;
    }

    .bento-card:hover {
      transform: scale(1.02);
      box-shadow:
        0 12px 36px rgba(0, 0, 0, 0.2),
        0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .bento-card-wheels {
      grid-column: 1 / 2;
      grid-row: 1 / 3;
      min-height: 700px;
    }

    .bento-card-engine {
      grid-column: 2 / 4;
      grid-row: 1 / 2;
    }

    .bento-card-difflocked {
      grid-column: 2 / 3;
      grid-row: 2 / 3;
    }

    .bento-card-tow {
      grid-column: 3 / 4;
      grid-row: 2 / 3;
    }

    .bento-card-vikor {
      grid-column: 1 / 2;
      grid-row: 3 / 4;
      min-height: 400px;
    }

    .bento-card-suspension {
      grid-column: 2 / 4;
      grid-row: 3 / 4;
    }
  }

  /* ===== Large Screens ===== */
  @media (min-width: 1200px) {
    .bento-section {
      padding: 0px 0px;
    }

    .bento-grid {
      gap: 20px;
    }
  }

  /* ===== Background Images ===== */
  .bento-card-wheels {
    background-image: url("https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?auto=format&fit=crop&w=800&q=80");
  }

  .bento-card-engine {
    background-image: url("https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=600&q=80");
  }

  .bento-card-suspension {
    background-image: url("https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=600&q=80");
  }

  .bento-card-difflocked {
    background-image: url("https://images.unsplash.com/photo-1552519507-da3b142c6e3d?auto=format&fit=crop&w=600&q=80");
  }

  .bento-card-tow {
    background-image: url("https://images.unsplash.com/photo-1544636331-e26879cd4d9b?auto=format&fit=crop&w=600&q=80");
  }

  .bento-card-vikor {
    background-image: url("https://images.unsplash.com/photo-1542362567-b07e54358753?auto=format&fit=crop&w=1200&q=80");
  }
</style>

<section class="bento-section" aria-label="Vehicle features">
  <div class="bento-grid">
    <!-- 1 — Left tall card -->
    <div class="bento-card bento-card-wheels">
      <div class="bento-card-content">
        <h3 class="bento-card-title">Black Rhino Wheels</h3>
        <p class="bento-card-subtitle">37" Maxxis Razr Tyres</p>
      </div>
    </div>

    <!-- 2 — Top Span right -->
    <div class="bento-card bento-card-engine">
      <div class="bento-card-content">
        <h3 class="bento-card-title">6.2L V8 Petrol Engine</h3>
        <p class="bento-card-subtitle">313kW Power &amp; 624Nm Torque</p>
      </div>
    </div>

    <!-- 3 — Center middle -->
    <div class="bento-card bento-card-difflocked">
      <div class="bento-card-content">
        <h3 class="bento-card-title">Twin Diff Locked</h3>
        <p class="bento-card-subtitle">For those hard-to-get places</p>
      </div>
    </div>

    <!-- 4 — Center right -->
    <div class="bento-card bento-card-tow">
      <div class="bento-card-content">
        <h3 class="bento-card-title">4.2t Tow Capacity</h3>
        <p class="bento-card-subtitle">Tow anything you want</p>
      </div>
    </div>

    <!-- 5 — Buttom left-->
    <div class="bento-card bento-card-vikor">
      <div class="bento-card-content">
        <h3 class="bento-card-title">Vikor Roller Shutter &amp;</h3>
        <p class="bento-card-subtitle">Vikor Electric Steps</p>
      </div>
    </div>

    <!-- 6 — Bottom span right -->
    <div class="bento-card bento-card-suspension">
      <div class="bento-card-content">
        <h3 class="bento-card-title">6-Inch BDS Suspension w/</h3>
        <p class="bento-card-subtitle">Fox 2.5 Elite Shocks</p>
      </div>
    </div>
  </div>
</section>
