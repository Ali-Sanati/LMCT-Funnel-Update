<style>
  @import url("https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap");

  /* ===== Base ===== */
  .giveaway-section {
    font-family:
      "Inter",
      system-ui,
      -apple-system,
      sans-serif;
  }

  .giveaway-section *,
  .giveaway-section *::before,
  .giveaway-section *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  /* ===== Grid (Mobile First) ===== */
  .giveaway-grid {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }

  /* ===== Card ===== */
  .giveaway-card {
    position: relative;
    background: #fff;
    border-radius: 16px;
    padding: 16px;
    min-height: 220px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    transition:
      transform 0.25s ease,
      box-shadow 0.25s ease;
    overflow: visible;
  }

  /* ===== Badge ===== */
  .card-badge {
    display: inline-block;
    background: #0a1a2f;
    color: #fff;
    font-size: clamp(14px, 1.5vw, 18px);
    font-weight: 700;
    text-align: center;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 6px;
    margin-bottom: 10px;
  }

  .card-badge.red {
    background: #e53935;
  }

  /* ===== Text ===== */
  .card-title {
    font-size: clamp(18px, 2.8vw, 26px);
    font-weight: 800;
    text-transform: uppercase;
    color: #0a1a2f;
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .card-subtitle {
    font-size: clamp(14px, 2vw, 18px);
    font-weight: 500;
    color: #555;
    line-height: 1.4;
    margin-bottom: 16px;
  }

  /* ===== Image Area ===== */
  .card-image {
    position: absolute;
    left: 24px;
    right: 12px;
    bottom: 8px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 8px;
    z-index: 2;
  }

  .card-image img {
    display: block;
    object-fit: contain;
    filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.15));
  }

  /* Responsive image sizing (no repeated media rules) */
  .card-image img:first-child {
    width: clamp(70px, 8vw, 95px);
    height: clamp(70px, 8vw, 95px);
  }

  .card-image img:last-child {
    width: clamp(85px, 10vw, 110px);
    height: clamp(85px, 10vw, 110px);
  }

  /* ===== Date Overlay ===== */
  .date {
    position: absolute;
    top: 60%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(36px, 6vw, 50px);
    font-weight: 700;
    color: #0a1a2f;
    line-height: 1;
    z-index: 3;
    pointer-events: none;
  }

  .date-wrapper {
    position: relative;
  }

  /* ===== Tablet (2 columns) ===== */
  @media (min-width: 640px) {
    .giveaway-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .giveaway-card {
      padding: 20px;
      min-height: 240px;
    }
  }

  /* ===== Desktop (4 columns + hover) ===== */
  @media (min-width: 900px) {
    .giveaway-grid {
      grid-template-columns: repeat(4, 1fr);
    }

    .giveaway-card {
      padding: 24px;
      min-height: 260px;
    }

    .giveaway-card:hover {
      transform: translateY(-4px);
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.18),
        0 6px 16px rgba(0, 0, 0, 0.08);
    }
  }

  /* ===== Large Desktop ===== */
  @media (min-width: 1200px) {
    .giveaway-card {
      min-height: 280px;
    }
  }
</style>
