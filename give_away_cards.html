<style>
  @import url("https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap");

  .card-title.first {
    font-size: clamp(14px, 1.5vw, 18px);
    font-weight: 800;
  }

  .card-subtitle.first {
    font-size: clamp(14px, 1.5vw, 18px);
    font-weight: bold;
  }

  /* ===== Base ===== */
  .giveaway-section {
    font-family:
      "Inter",
      system-ui,
      -apple-system,
      sans-serif;
  }

  .giveaway-section *,
  .giveaway-section *::before,
  .giveaway-section *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  /* ===== Grid (Mobile First) ===== */
  .giveaway-grid {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }

  /* ===== Card ===== */
  .giveaway-card {
    position: relative;
    background: #fff;
    border-radius: 16px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    transition:
      transform 0.25s ease,
      box-shadow 0.25s ease;
    overflow: visible;
  }

  .giveaway-card:hover {
    transform: translateY(-4px);
    box-shadow:
      0 18px 40px rgba(0, 0, 0, 0.18),
      0 6px 16px rgba(0, 0, 0, 0.08);
  }

  /* ===== Badge ===== */
  .card-badge {
    display: inline-block;
    background: #0a1a2f;
    color: #fff;
    font-size: clamp(14px, 1.5vw, 18px);
    font-weight: 700;
    text-align: center;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 6px;
    margin-bottom: 10px;
  }

  .card-badge.red {
    background: #e53935;
  }

  /* ===== Text ===== */
  .card-title {
    font-size: clamp(18px, 2.8vw, 26px);
    font-weight: 800;
    text-transform: uppercase;
    color: #0a1a2f;
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .card-subtitle {
    font-size: clamp(14px, 2vw, 18px);
    font-weight: 600;
    color: #555;
    line-height: 1.4;
    margin-bottom: 16px;
  }

  /* ===== Image Area ===== */
  .car-image-container {
    /* border: 1px solid #003cff; */
    position: relative;
    height: 40px;
  }

  .card-image {
    /* border: #e53935 2px solid; */
    position: absolute;
    width: 100%;
    top: 80%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    justify-content: space-between;
    gap: 8px;
    z-index: 2;
  }

  .card-image img {
    display: block;
    object-fit: contain;
    filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.15));
  }

  /* Responsive image sizing (no repeated media rules) */
  .card-image img:first-child {
    width: clamp(70px, 8vw, 95px);
    height: clamp(70px, 8vw, 95px);
  }

  .card-image img:last-child {
    width: clamp(85px, 10vw, 110px);
    height: clamp(85px, 10vw, 110px);
  }

  /* ===== Date Overlay ===== */
  .date {
    position: absolute;
    top: 60%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(36px, 6vw, 50px);
    font-weight: 900;
    color: #0a1a2f;
    line-height: 1;
    z-index: 3;
    pointer-events: none;
  }

  .date-wrapper {
    position: relative;
  }

  /* ===== Tablet (2 columns) ===== */
  @media (max-width: 770px) {
    .giveaway-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }
  }
</style>

<section class="giveaway-section" aria-label="Giveaway details">
  <div class="giveaway-grid">
    <div class="giveaway-card">
      <span class="card-badge">First Prize</span>
      <div class="card-title first">Chevrolet Silverado</div>
      <div class="card-subtitle first">or $120,000 Cash!</div>
      <div class="car-image-container">
        <div class="card-image">
          <img
            src="https://images.clickfunnels.com/79/aa306b82b149adb9ece2bdc8b08a74/lmct.svg"
          />
          <img
            src="https://images.clickfunnels.com/6c/97ee2c576d4e97a29b7e995d3f7fe1/key.svg"
          />
        </div>
      </div>
    </div>

    <div class="giveaway-card">
      <span class="card-badge">Gates Open</span>
      <div class="card-title">12:00 AM</div>
      <div class="card-subtitle">March 10<sup>th</sup></div>
      <div class="car-image-container">
        <div class="card-image">
          <img
            style="width: 30%"
            src="https://images.clickfunnels.com/3c/f6aa62120f48a6b6207e6cc242f1ef/timezone.svg"
          />
          <img
            src="https://images.clickfunnels.com/db/4229c2397f4a26ade20d05154c7360/lock.svg"
          />
        </div>
      </div>
    </div>

    <div class="giveaway-card">
      <span class="card-badge">Entries Close</span>
      <div class="card-title">8:30 PM</div>
      <div class="card-subtitle">March 26<sup>th</sup></div>
      <div class="car-image-container">
        <div class="card-image">
          <img
            style="width: 30%"
            src="https://images.clickfunnels.com/3c/f6aa62120f48a6b6207e6cc242f1ef/timezone.svg"
          />

          <img
            src="https://images.clickfunnels.com/5b/e057ce7b584e788404ba6af3fe396a/clock.svg"
          />
        </div>
      </div>
    </div>

    <div class="giveaway-card">
      <span class="card-badge red">Live Draw</span>
      <div class="card-title">8:30 PM</div>
      <div class="card-subtitle">March 26<sup>th</sup> AEDT*</div>
      <div class="car-image-container">
        <div class="card-image">
          <img
            style="width: 50%"

          />
          <div class="date-wrapper">

              style="width: 100px; height: 100px"

            />

          </div>
        </div>
      </div>
    </div>
  </div>
</section>
